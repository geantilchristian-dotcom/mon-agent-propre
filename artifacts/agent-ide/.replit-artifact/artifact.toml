kind = "web"
previewPath = "/"
title = "Agent IDE"
version = "1.0.0"
id = "artifacts/agent-ide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18517

[services.development]
run = "pnpm --filter @workspace/agent-ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-ide", "run", "build" ]
publicDir = "artifacts/agent-ide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18517"
BASE_PATH = "/"
