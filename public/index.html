<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joindre un projet GitHub</title>
</head>
<body>
    <h1>Joindre un projet GitHub</h1>
    <button id="join-project-button">Joindre un projet</button>
    <script>
        document.getElementById('join-project-button').addEventListener('click', function() {
            // Ici, vous pouvez ajouter la logique pour joindre un projet GitHub
            // Par exemple, ouvrir une fenêtre pour autoriser l'accès à GitHub
            window.open('https://github.com/login/oauth/authorize?client_id=VOTRE_CLIENT_ID', '_blank');
        });
    </script>
</body>
</html>
