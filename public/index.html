<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Agent IA IDE</title>
    <style>
        /* Design responsive global */
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; }
        
        /* Conteneur principal (s'adapte à la taille) */
        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        
        /* Simulateur d'écran */
        .device-container { 
            flex: 2; border: 8px solid #444; border-radius: 12px; background: white;
            display: flex; flex-direction: column; transition: width 0.3s ease;
        }
        #sim-frame { width: 100%; height: 100%; border: none; }

        /* Panneau IA */
        .ai-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        textarea { flex: 1; background: #2d2d2d; color: #00ff00; padding: 10px; border: none; }

        /* Media Query : Mobile */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .device-container { height: 300px; }
        }
    </style>
</head>
<body>

    <div style="padding: 10px; text-align: center;">
        <button onclick="setMode('mobile')">📱 Mobile</button>
        <button onclick="setMode('desktop')">💻 Desktop</button>
    </div>

    <div class="main-layout">
        <div class="device-container" id="device">
            <iframe id="sim-frame" src="https://github.com/"></iframe>
        </div>

        <div class="ai-panel">
            <textarea id="chat-input" placeholder="Demandez à l'IA de modifier le code..."></textarea>
            <button onclick="envoyerAction()" style="padding: 15px; background: #007acc; border: none; color: white;">Envoyer l'ordre</button>
        </div>
    </div>

    <script>
        function setMode(mode) {
            const device = document.getElementById('device');
            device.style.width = (mode === 'mobile') ? '375px' : '100%';
        }
        
        async function envoyerAction() {
            const msg = document.getElementById('chat-input').value;
            alert("Envoi à l'IA : " + msg);
            // Ici, ajouter la logique fetch('/api/chat', ...)
        }
    </script>
</body>
</html>
