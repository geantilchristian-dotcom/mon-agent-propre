<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agent IDE | Professional Suite</title>
    <style>
        /* --- CSS MODERNE (IDE PRO) --- */
        :root { --bg: #0d1117; --sidebar: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; }
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .toolbar { height: 50px; background: #0d1117; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        
        #editor { flex: 1; background: #000; color: #79c0ff; padding: 25px; font-family: 'Consolas', monospace; font-size: 14px; overflow: auto; outline: none; white-space: pre-wrap; line-height: 1.5; }
        .chat-panel { width: 350px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; font-size: 13px; }
        .chat-input { padding: 20px; border-top: 1px solid var(--border); }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #0d1117; color: white; width: 100%; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; overflow-y: auto; }
        li { padding: 8px; cursor: pointer; border-radius: 4px; color: #8b949e; }
        li:hover { background: #1f242c; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Configuration</h3>
    <input id="token" placeholder="GitHub Token" type="password">
    <input id="repo" placeholder="User/Repo">
    <button onclick="connecter()">Initialiser Dépôt</button>
    <hr style="width:100%; border:0; border-top:1px solid var(--border)">
    <strong>Fichiers</strong>
    <ul id="file-list"></ul>
</div>

<div class="main">
    <div class="toolbar">
        <span id="filename">Aucun fichier</span>
        <button onclick="sauvegarder()" style="width:auto; padding:5px 20px; background:#238636;">Enregistrer</button>
    </div>
    <div id="editor" contenteditable="true" spellcheck="false">Sélectionnez un fichier...</div>
</div>

<div class="chat-panel">
    <div id="messages"></div>
    <div class="chat-input">
        <input id="user-msg" placeholder="Demander une modif..." onkeypress="if(event.key==='Enter') envoyer()">
    </div>
</div>

<input type="hidden" id="current-path">
<input type="hidden" id="current-sha">

<script>
    // --- LOGIQUE CORE ---

    // 1. Persistance (LocalStorage)
    window.onload = () => {
        if(localStorage.getItem('saved_code')) {
            document.getElementById('editor').innerText = localStorage.getItem('saved_code');
        }
    };

    document.getElementById('editor').addEventListener('input', () => {
        localStorage.setItem('saved_code', document.getElementById('editor').innerText);
    });

    // 2. Connexion et Chargement
    async function connecter() {
        const token = document.getElementById('token').value;
        const repo = document.getElementById('repo').value;
        await fetch('/api/configurer', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ token, repo }) });
        const res = await fetch('/api/fichiers');
        const files = await res.json();
        document.getElementById('file-list').innerHTML = files.map(f => 
            `<li onclick="lireFichier('${f.path}')">${f.type==='file'?'📄':'📁'} ${f.name}</li>`).join('');
    }

    // 3. Lecture
    async function lireFichier(path) {
        const res = await fetch(`/api/lire?path=${encodeURIComponent(path)}`);
        const data = await res.json();
        document.getElementById('editor').innerText = data.content;
        document.getElementById('filename').innerText = path;
        document.getElementById('current-path').value = path;
        document.getElementById('current-sha').value = data.sha;
    }

    // 4. Sauvegarde
    async function sauvegarder() {
        const path = document.getElementById('current-path').value;
        const content = document.getElementById('editor').innerText;
        const sha = document.getElementById('current-sha').value;
        await fetch('/api/ecrire', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ path, content, sha }) });
        alert('Code synchronisé avec GitHub !');
    }

    // 5. Chat avec IA
    async function envoyer() {
        const msg = document.getElementById('user-msg').value;
        const messages = document.getElementById('messages');
        messages.innerHTML += `<div><b>Vous:</b> ${msg}</div>`;
        
        const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ message: msg, fileContent: document.getElementById('editor').innerText, fileName: document.getElementById('current-path').value }) 
        });
        const data = await res.json();
        messages.innerHTML += `<div><b>IA:</b> ${data.response}</div>`;
        document.getElementById('user-msg').value = '';
    }
</script>

</body>
</html>
