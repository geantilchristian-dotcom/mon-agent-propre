<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Agent IA IDE Pro</title>
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --border: #30363d; --accent: #238636; --text: #c9d1d9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; background: var(--bg); color: var(--text); }

        /* Configuration Panel */
        .config-bar { background: #252526; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
        input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 5px 10px; border-radius: 4px; }

        /* Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 200px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 15px; }
        .editor-container { flex: 1; display: flex; flex-direction: column; }
        
        /* IDE Area */
        .preview-area { flex: 1; background: white; border: none; }
        .chat-area { height: 300px; background: var(--sidebar); border-top: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; }
        
        #messages { flex: 1; overflow-y: auto; margin-bottom: 10px; padding: 10px; background: #0d1117; border-radius: 5px; }
        .chat-input { display: flex; gap: 10px; }
        
        @media (max-width: 768px) { .main-container { flex-direction: column; } .sidebar { width: 100%; height: auto; } }
    </style>
</head>
<body>

<div style="flex: 1; display: flex; flex-direction: column;">
    <div class="config-bar">
        <input type="text" id="token" placeholder="GitHub Token">
        <input type="text" id="repo" placeholder="Utilisateur/Repo">
        <button onclick="connecter()">🔗 Connecter l'Agent</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h4>Fichiers du projet</h4>
            <ul id="file-list" style="list-style: none; padding: 0;"></ul>
        </div>

        <div class="editor-container">
            <iframe id="sim-frame" class="preview-area" src="about:blank"></iframe>
            
            <div class="chat-area">
                <div id="messages"></div>
                <div class="chat-input">
                    <input type="text" id="user-input" style="flex:1" placeholder="Demander une modification...">
                    <button onclick="envoyer()">Envoyer</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function connecter() {
        const token = document.getElementById('token').value;
        const repo = document.getElementById('repo').value;
        const res = await fetch('/api/configurer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ token, repo })
        });
        const data = await res.json();
        alert(data.message);
    }

    async function envoyer() {
        const input = document.getElementById('user-input');
        const messages = document.getElementById('messages');
        const msg = input.value;
        
        messages.innerHTML += `<div><b>Vous:</b> ${msg}</div>`;
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: msg, filename: 'server.js' })
        });
        const data = await res.json();
        messages.innerHTML += `<div><b>Agent:</b> ${data.response}</div>`;
        input.value = '';
        messages.scrollTop = messages.scrollHeight;
    }
</script>
</body>
</html>
