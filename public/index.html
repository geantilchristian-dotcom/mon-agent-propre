<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Agent IDE Pro</title>
    <style>
        /* Reset et base */
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; background: #0d1117; color: #c9d1d9; }

        /* Sidebar fichiers */
        .sidebar { width: 250px; background: #161b22; border-right: 1px solid #30363d; padding: 20px; display: flex; flex-direction: column; }
        
        /* Conteneur principal */
        .main-content { flex: 1; display: flex; flex-direction: column; }

        /* Zone de prévisualisation (le simulateur) */
        .editor-area { flex: 1; border-bottom: 1px solid #30363d; background: #fff; }
        #sim-frame { width: 100%; height: 100%; border: none; }

        /* Zone de Chat */
        .chat-area { height: 250px; background: #0d1117; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        #messages { flex: 1; overflow-y: auto; font-size: 14px; border: 1px solid #30363d; padding: 10px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #21262d; border: 1px solid #30363d; color: white; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 100px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Mon Projet</h3>
        <ul id="file-list" style="list-style: none; padding: 0;">
            <li>📄 server.js</li>
            <li>📄 index.html</li>
            <li>📄 package.json</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="editor-area">
            <iframe id="sim-frame" src="about:blank"></iframe>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Demandez une modification à l'agent...">
                <button onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        // Logique de communication
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            const messages = document.getElementById('messages');
            
            messages.innerHTML += `<div><b>Vous:</b> ${msg}</div>`;
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, filename: 'server.js' })
            });
            const data = await res.json();
            messages.innerHTML += `<div><b>Agent:</b> ${data.response}</div>`;
            input.value = '';
        }
    </script>
</body>
</html>
