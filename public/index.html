<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agent IDE Pro</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: #fff; font-family: sans-serif; }
        .toolbar { padding: 10px; background: #2d2d2d; display: flex; gap: 10px; border-bottom: 1px solid #444; }
        .main { display: flex; flex: 1; }
        .sidebar { width: 250px; background: #252526; padding: 15px; }
        .editor-zone { flex: 1; display: flex; flex-direction: column; }
        #code-display { flex: 1; padding: 20px; background: #121212; color: #00ff00; font-family: monospace; }
        .chat-zone { height: 200px; background: #1e1e1e; border-top: 2px solid #333; display: flex; flex-direction: column; padding: 10px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <input id="github-token" placeholder="Clé Token GitHub">
        <input id="github-repo" placeholder="Utilisateur/Projet">
        <button onclick="connecterAgent()">🔌 Connecter l'Agent</button>
    </div>
    <div class="main">
        <div class="sidebar" id="file-tree">Projet vide...</div>
        <div class="editor-zone">
            <div id="code-display">Sélectionnez un projet pour voir le code ici...</div>
            <div class="chat-zone">
                <div id="history" style="flex:1; overflow-y:auto"></div>
                <input id="user-msg" placeholder="Instruction pour l'IA...">
                <button onclick="envoyerInstruction()">Envoyer</button>
            </div>
        </div>
    </div>
    <script>
        async function connecterAgent() {
            const token = document.getElementById('github-token').value;
            const repo = document.getElementById('github-repo').value;
            const res = await fetch('/api/configurer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token, repo })
            });
            alert((await res.json()).message);
        }
    </script>
</body>
</html>
