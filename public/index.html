<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agent IDE | Pro</title>
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #238636; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: sans-serif; }
        
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-panel { width: 350px; background: var(--sidebar); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        
        #editor { flex: 1; background: #000; color: #58a6ff; padding: 20px; outline: none; font-family: monospace; overflow: auto; white-space: pre-wrap; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        
        input, button { padding: 10px; border-radius: 5px; border: 1px solid var(--border); background: #0d1117; color: white; margin-bottom: 5px; }
        button { background: var(--accent); cursor: pointer; }
        li { cursor: pointer; padding: 5px; color: #8b949e; }
        li:hover { color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <input id="token" placeholder="GitHub Token" type="password">
        <input id="repo" placeholder="User/Repo">
        <button onclick="connecter()">Connecter</button>
        <ul id="file-list"></ul>
    </div>

    <div class="main">
        <div style="background:#161b22; padding:10px; display:flex; justify-content:space-between;">
            <span id="filename">Aucun fichier</span>
            <button onclick="sauvegarder()">Enregistrer</button>
        </div>
        <div id="editor" contenteditable="true"></div>
    </div>

    <div class="chat-panel">
        <div id="messages"></div>
        <div style="padding:15px; border-top:1px solid var(--border);">
            <input id="user-msg" style="width:100%" placeholder="Demander une modif...">
            <button style="width:100%" onclick="envoyer()">Envoyer</button>
        </div>
    </div>

    <input type="hidden" id="current-path">
    <input type="hidden" id="current-sha">

    <script>
        // Gestion Entrée
        document.getElementById('user-msg').addEventListener('keypress', (e) => { if(e.key === 'Enter') envoyer(); });

        async function connecter() {
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;
            await fetch('/api/configurer', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ token, repo }) });
            const res = await fetch('/api/fichiers');
            const files = await res.json();
            document.getElementById('file-list').innerHTML = files.map(f => `<li onclick="lireFichier('${f.path}')">${f.type==='file'?'📄':'📁'} ${f.name}</li>`).join('');
        }

        async function lireFichier(path) {
            const res = await fetch(`/api/lire?path=${encodeURIComponent(path)}`);
            const data = await res.json();
            if(data.type === 'file') {
                document.getElementById('editor').innerText = data.content;
                document.getElementById('filename').innerText = path;
                document.getElementById('current-path').value = path;
                document.getElementById('current-sha').value = data.sha;
            } else {
                alert("C'est un dossier !");
            }
        }

        async function sauvegarder() {
            const path = document.getElementById('current-path').value;
            const content = document.getElementById('editor').innerText;
            const sha = document.getElementById('current-sha').value;
            await fetch('/api/ecrire', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ path, content, sha }) });
            alert('Sauvegardé !');
        }

        async function envoyer() {
            const msg = document.getElementById('user-msg').value;
            const content = document.getElementById('editor').innerText;
            const path = document.getElementById('current-path').value;
            
            document.getElementById('messages').innerHTML += `<div><b>Vous:</b> ${msg}</div>`;
            const res = await fetch('/api/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ message: msg, fileContent: content, fileName: path }) 
            });
            const data = await res.json();
            document.getElementById('messages').innerHTML += `<div><b>IA:</b> ${data.response}</div>`;
            document.getElementById('user-msg').value = '';
        }
    </script>
</body>
</html>
