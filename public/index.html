<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Agent IDE</title>
    <style>
        /* Reset et base */
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; }
        
        /* 1. Sidebar Fixe */
        .sidebar { width: 260px; min-width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        
        /* 2. Zone Éditeur (Centre) */
        .editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #editor { flex: 1; background: #000; color: #0f0; padding: 20px; outline: none; overflow: auto; white-space: pre-wrap; font-family: monospace; }
        .toolbar { padding: 10px; background: #222; border-bottom: 1px solid #333; }
        
        /* 3. Panel Chat (Droite) */
        .chat-panel { width: 350px; min-width: 350px; background: #1a1a1a; border-left: 1px solid #333; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; }
        .chat-input-zone { padding: 15px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="sidebar">
        <input id="token" placeholder="GitHub Token" style="width:100%; padding:8px; margin-bottom:5px;">
        <input id="repo" placeholder="User/Repo" style="width:100%; padding:8px;">
        <button onclick="connecter()" style="margin-top:5px; width:100%;">Connecter</button>
        <ul id="file-list" style="list-style:none; padding:0; flex:1; overflow-y:auto;"></ul>
    </div>

    <div class="editor-container">
        <div class="toolbar">
            <button onclick="sauvegarder()">Enregistrer</button>
        </div>
        <div id="editor" contenteditable="true"></div>
    </div>

    <div class="chat-panel">
        <div id="messages"></div>
        <div class="chat-input-zone">
            <input id="user-msg" style="width:100%; padding:10px;" placeholder="Message..." onkeypress="if(event.key==='Enter') envoyer()">
        </div>
    </div>

    <script>
        // ... (vos fonctions connecter, lireFichier, sauvegarder, envoyer)
    </script>
</body>
</html>
