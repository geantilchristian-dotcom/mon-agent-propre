services:
  - type: web
    name: mon-agent-propre
    runtime: node
    plan: free
    buildCommand: >-
      curl -fsSL https://get.pnpm.io/install.sh | SHELL=bash bash - &&
      export PATH="$HOME/.local/share/pnpm:$PATH" &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/agent-ide run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
