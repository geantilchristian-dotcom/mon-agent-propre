services:
  - type: web
    name: mon-agent-propre
    runtime: node
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/agent-ide run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
